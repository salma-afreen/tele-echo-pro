<!DOCTYPE html>
<html>
<head>
  <title>Upload</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 40px;
      text-align: center;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 400px;
      margin: auto;
    }

    button {
      padding: 10px 20px;
      background: #2b7cff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #msg {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Upload DICOM</h2>

  <input type="file" id="file"><br><br>

  <button onclick="upload()">Upload</button>
  <button onclick="skip()" style="background: gray; margin-left: 10px;">Skip (Testing)</button>

  <p id="msg"></p>

</div>

<script>
function upload() {
  let file = document.getElementById("file").files[0];

  if(!file) {
    document.getElementById("msg").innerText = "No file selected";
    return;
  }

  if(!file.name.endsWith(".dcm")) {
    document.getElementById("msg").innerText = "Only DICOM allowed!";
    return;
  }

  localStorage.setItem("uploaded", "yes");

  document.getElementById("msg").innerText = "Upload complete";

  setTimeout(() => {
    window.location.href = "viewer.html";
  }, 1000);
}

// 🚀 TEST MODE (NO DICOM NEEDED)
function skip() {
  localStorage.setItem("uploaded", "test");

  document.getElementById("msg").innerText = "Skipping upload (test mode)";

  setTimeout(() => {
    window.location.href = "viewer.html";
  }, 1000);
}
</script>

</body>
</html>
