<!DOCTYPE html>
<html>
<head>
  <title>Echo Viewer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* LEFT PANEL */
    .left {
      width: 300px;
      background: white;
      padding: 20px;
      border-right: 1px solid #ddd;
    }

    .left h3 {
      margin-top: 0;
    }

    /* CENTER VIEWER */
    .center {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      color: white;
    }

    .viewer-box {
      width: 80%;
      height: 60%;
      border: 2px dashed gray;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
    }

    /* RIGHT PANEL */
    .right {
      width: 300px;
      background: white;
      padding: 20px;
      border-left: 1px solid #ddd;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #2b7cff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #uploadMsg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <h3>Study Info</h3>

    <p><b>Study ID:</b></p>
    <p id="studyId"></p>

    <h3>Upload DICOM</h3>
    <input type="file" id="file">
    <button onclick="upload()">Upload</button>

    <p id="uploadMsg"></p>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="viewer-box" id="viewerText">
      No image uploaded
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h3>Measurements</h3>

    <label>EF (%)</label>
    <input id="ef" placeholder="Enter EF">

    <label>LV Function</label>
    <select id="lv">
      <option>Normal</option>
      <option>Mild Dysfunction</option>
      <option>Moderate Dysfunction</option>
      <option>Severe Dysfunction</option>
    </select>

    <button onclick="save()">Save & Continue</button>
  </div>

</div>

<script>
// Show Study ID
document.getElementById("studyId").innerText =
  localStorage.getItem("studyId") || "TEST-STUDY-001";

// Upload function
function upload() {
  let file = document.getElementById("file").files[0];

  if (!file) {
    document.getElementById("uploadMsg").innerText = "Select file";
    return;
  }

  if (!file.name.endsWith(".dcm")) {
    document.getElementById("uploadMsg").innerText = "Only DICOM allowed";
    return;
  }

  localStorage.setItem("uploaded", "yes");

  document.getElementById("uploadMsg").innerText = "Upload successful";

  // Fake preview
  document.getElementById("viewerText").innerText =
    "DICOM Loaded: " + file.name;
}

// SAVE FUNCTION (FIXED 🚀)
function save() {
  let ef = document.getElementById("ef").value;

  // Allow testing even without upload
  let uploaded = localStorage.getItem("uploaded");

  if (!uploaded) {
    let proceed = confirm("No DICOM uploaded. Continue for testing?");
    if (!proceed) return;
  }

  if (!ef) {
    alert("Enter EF");
    return;
  }

  localStorage.setItem("ef", ef);
  localStorage.setItem("lv", document.getElementById("lv").value);

  window.location.href = "report.html";
}
</script>

</body>
</html>
